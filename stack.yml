# platform-docker — Docker Swarm stack (con Traefik)
#
# Para deploy en Swarm + Traefik. Si solo querés docker compose simple, ver docker-compose.yml.
#
# El template NO crea postgres propio — conectamos al postgres del cliente vía DATABASE_URL.
#
# Variables Swarm-específicas en .env:
#   EXTERNAL_NETWORK     red overlay externa donde viven postgres + chatwoot + traefik del cliente
#   PUBLIC_HOST          dominio público (ej: platform.cliente.com)
#   IMAGE_BACKEND_TAG    ej: javierrodriguez4/platform-backend:0.3.1
#   IMAGE_FRONTEND_TAG   ej: javierrodriguez4/platform-frontend:0.6.0
#
# Deploy:
#   set -a && source .env && set +a
#   docker stack deploy -c stack.yml platform

services:
  backend:
    image: ${IMAGE_BACKEND_TAG}
    environment:
      NODE_ENV: production
      BACKEND_PORT: 3000
      CORS_ORIGIN: https://${PUBLIC_HOST}
      # URL pública de la instancia: la usan rebook_url (notify_cancellation) y la
      # URL corta /c/{token} "agregar a mi calendario". Se deriva de PUBLIC_HOST.
      PLATFORM_PUBLIC_URL: https://${PUBLIC_HOST}
      DATABASE_URL: ${DATABASE_URL}
      JWT_SECRET: ${JWT_SECRET}
      JWT_EXPIRES_IN: ${JWT_EXPIRES_IN:-7d}
      RUN_DB_PUSH: ${RUN_DB_PUSH:-false}
      # ── Auth ──────────────────────────────────────────────────────────────
      AUTH_LOCAL_ENABLED: ${AUTH_LOCAL_ENABLED:-true}
      BOT_SERVICE_KEY: ${BOT_SERVICE_KEY:-}
      # ── OIDC / Keycloak (off por defecto) ─────────────────────────────────
      OIDC_ENABLED: ${OIDC_ENABLED:-false}
      OIDC_ISSUER: ${OIDC_ISSUER:-}
      OIDC_INTERNAL_ISSUER: ${OIDC_INTERNAL_ISSUER:-}
      OIDC_CLIENT_ID: ${OIDC_CLIENT_ID:-}
      OIDC_CLIENT_SECRET: ${OIDC_CLIENT_SECRET:-}
      OIDC_REDIRECT_URI: ${OIDC_REDIRECT_URI:-}
      OIDC_POST_LOGIN_REDIRECT: ${OIDC_POST_LOGIN_REDIRECT:-/oidc/callback}
      OIDC_POST_LOGOUT_REDIRECT: ${OIDC_POST_LOGOUT_REDIRECT:-}
      OIDC_ROLE_ADMIN: ${OIDC_ROLE_ADMIN:-platform-admin}
      OIDC_DEFAULT_ROLE_CODE: ${OIDC_DEFAULT_ROLE_CODE:-user}
      # ── Keycloak Admin API (ABM de usuarios) ──────────────────────────────
      KEYCLOAK_ADMIN_CLIENT_ID: ${KEYCLOAK_ADMIN_CLIENT_ID:-}
      KEYCLOAK_ADMIN_CLIENT_SECRET: ${KEYCLOAK_ADMIN_CLIENT_SECRET:-}
      # ── Integraciones (opcionales — dejá vacío para desactivar) ──────────
      METABASE_SITE_URL: ${METABASE_SITE_URL:-}
      METABASE_EMBED_SECRET: ${METABASE_EMBED_SECRET:-}
      METABASE_DEFAULT_DASHBOARD_ID: ${METABASE_DEFAULT_DASHBOARD_ID:-}
      CHATWOOT_PUBLIC_URL: ${CHATWOOT_PUBLIC_URL:-}
      CHATWOOT_INTERNAL_URL: ${CHATWOOT_INTERNAL_URL:-}
      CHATWOOT_PLATFORM_TOKEN: ${CHATWOOT_PLATFORM_TOKEN:-}
      CHATWOOT_ACCOUNT_ID: ${CHATWOOT_ACCOUNT_ID:-1}
      CHATWOOT_ADMIN_USER_TOKEN: ${CHATWOOT_ADMIN_USER_TOKEN:-}
      CHATWOOT_DEFAULT_INBOX_IDS: ${CHATWOOT_DEFAULT_INBOX_IDS:-}
      CHATWOOT_ROLE_FOR_PLATFORM_ADMIN: ${CHATWOOT_ROLE_FOR_PLATFORM_ADMIN:-administrator}
      CHATWOOT_ROLE_FOR_PLATFORM_USER: ${CHATWOOT_ROLE_FOR_PLATFORM_USER:-agent}
      NOCODB_PUBLIC_URL: ${NOCODB_PUBLIC_URL:-}
      # ── Object storage (MinIO/S3): uploads de logo (branding) y documentos de
      # pacientes. Si S3_ENDPOINT está vacío, los uploads responden 503. ──
      S3_ENDPOINT: ${S3_ENDPOINT:-}
      S3_PUBLIC_URL: ${S3_PUBLIC_URL:-}
      S3_REGION: ${S3_REGION:-us-east-1}
      S3_ACCESS_KEY: ${S3_ACCESS_KEY:-}
      S3_SECRET_KEY: ${S3_SECRET_KEY:-}
      S3_BUCKET: ${S3_BUCKET:-platform-assets}
      N8N_PUBLIC_URL: ${N8N_PUBLIC_URL:-}
      N8N_INTERNAL_URL: ${N8N_INTERNAL_URL:-}
      N8N_API_KEY: ${N8N_API_KEY:-}
      EVOLUTION_BASE_URL: ${EVOLUTION_BASE_URL:-}
      EVOLUTION_INSTANCE_NAME: ${EVOLUTION_INSTANCE_NAME:-}
      EVOLUTION_INSTANCE_TOKEN: ${EVOLUTION_INSTANCE_TOKEN:-}
      SEED_ADMIN_EMAIL: ${SEED_ADMIN_EMAIL}
      SEED_ADMIN_PASSWORD: ${SEED_ADMIN_PASSWORD}
      SEED_ADMIN_NAME: ${SEED_ADMIN_NAME:-Administrador}
    networks:
      - external_net
    deploy:
      replicas: 1
      restart_policy:
        condition: on-failure
      resources:
        limits:
          memory: 512M

  frontend:
    image: ${IMAGE_FRONTEND_TAG}
    networks:
      - external_net
    deploy:
      replicas: 1
      restart_policy:
        condition: on-failure
      resources:
        limits:
          memory: 128M
      labels:
        - "traefik.enable=true"
        - "traefik.docker.network=${EXTERNAL_NETWORK}"
        - "traefik.http.routers.platform.entrypoints=websecure"
        - "traefik.http.routers.platform.rule=Host(`${PUBLIC_HOST}`)"
        - "traefik.http.routers.platform.tls=true"
        - "traefik.http.routers.platform.tls.certresolver=letsencryptresolver"
        - "traefik.http.services.platform.loadbalancer.passHostHeader=1"
        - "traefik.http.services.platform.loadbalancer.server.port=80"

networks:
  # Red overlay externa del cliente, donde ya viven postgres, chatwoot, traefik, etc.
  external_net:
    external: true
    name: ${EXTERNAL_NETWORK}
